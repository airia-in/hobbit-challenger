# API: hobbit-api.drcode.ai → api:3001 (tRPC, uploads, health)

server {
  listen 80;
  server_name hobbit-api.drcode.ai;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name hobbit-api.drcode.ai;

  ssl_certificate /etc/letsencrypt/live/hobbit.drcode.ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hobbit.drcode.ai/privkey.pem;

  client_max_body_size 10m;

  resolver 127.0.0.11 valid=10s ipv6=off;

  location / {
    proxy_pass http://api:3001;
    include /etc/nginx/snippets/proxy-params.conf;
  }
}


