# Frontend: hobbit.drcode.ai → web-host:4321
server {
  listen 80;
  server_name hobbit.drcode.ai;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name hobbit.drcode.ai;

  ssl_certificate /etc/letsencrypt/live/hobbit.drcode.ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hobbit.drcode.ai/privkey.pem;

  resolver 127.0.0.11 valid=10s ipv6=off;

  location / {
    proxy_pass http://web-host:4321;
    include /etc/nginx/snippets/proxy-params.conf;
  }
}

