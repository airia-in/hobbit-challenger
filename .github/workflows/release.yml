name: Release

# Manual CD: cut a versioned release, publish container images, and stage mobile assets.
# Automatic deploys still flow through CI → Build and Publish on main.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        type: string
      deploy:
        description: 'Run deploy dispatcher after image push'
        required: true
        type: boolean
        default: false
      public_api_url:
        description: 'PUBLIC_API_URL baked into mobile web bundle (default production HOBBIT API at hobbit-api.drcode.ai)'
        required: true
        type: string
        default: 'https://hobbit-api.drcode.ai'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Install compatible Corepack
        run: npm install --global corepack@0.34.2

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pinned pnpm
        run: corepack prepare pnpm@11.1.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: pnpm verify

  discover:
    name: Discover deployable apps
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has_apps: ${{ steps.set.outputs.has_apps }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover apps with a Dockerfile
        id: set
        run: |
          apps=$(find apps -maxdepth 2 -name Dockerfile -printf '%h\n' | sed 's#apps/##' | sort)
          matrix=$(printf '%s\n' "$apps" | grep -v '^$' | jq -R . | jq -cs .)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [ -n "$apps" ]; then
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    name: Build ${{ matrix.app }}
    needs: discover
    if: ${{ needs.discover.outputs.has_apps == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image and tag
        id: image
        run: |
          registry="${{ vars.DEPLOY_REGISTRY }}"
          if [ -z "$registry" ]; then
            registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          version="${{ inputs.version }}"
          echo "image=${registry}/${{ matrix.app }}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Require assetlinks fingerprints for web-host release
        if: matrix.app == 'web-host'
        run: |
          if [ -z "${{ secrets.ANDROID_SHA256_CERT_FINGERPRINTS }}" ]; then
            echo "::error::ANDROID_SHA256_CERT_FINGERPRINTS secret is required to publish web-host."
            exit 1
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}
            ${{ steps.image.outputs.image }}:latest
          build-args: |
            ANDROID_SHA256_CERT_FINGERPRINTS=${{ secrets.ANDROID_SHA256_CERT_FINGERPRINTS }}
            REQUIRE_ASSETLINKS_FINGERPRINTS=${{ matrix.app == 'web-host' && '1' || '0' }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  mobile-assets:
    name: Prepare mobile assets
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install compatible Corepack
        run: npm install --global corepack@0.34.2

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pinned pnpm
        run: corepack prepare pnpm@11.1.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Capacitor web bundle
        env:
          PUBLIC_API_URL: ${{ inputs.public_api_url }}
        run: pnpm --filter @workspace-starter/mobile build

      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/app/release.keystore
          echo "KEYSTORE_FILE=apps/mobile/android/app/release.keystore" >> "$GITHUB_ENV"

      - name: Build Android debug APK
        working-directory: apps/mobile/android
        env:
          ANDROID_VERSION_NAME: ${{ inputs.version }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Android release APK
        if: env.KEYSTORE_FILE != ''
        working-directory: apps/mobile/android
        env:
          ANDROID_VERSION_NAME: ${{ inputs.version }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Android release AAB
        if: env.KEYSTORE_FILE != ''
        working-directory: apps/mobile/android
        env:
          ANDROID_VERSION_NAME: ${{ inputs.version }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Archive mobile web bundle
        run: tar -czf mobile-web-bundle.tar.gz -C apps/mobile www capacitor.config.ts package.json

      - name: Upload mobile bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-bundle
          path: mobile-web-bundle.tar.gz
          retention-days: 90

      - name: Upload Android debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Upload Android release APK artifact
        if: env.KEYSTORE_FILE != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload Android release AAB artifact
        if: env.KEYSTORE_FILE != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [verify, build-images, mobile-assets, discover]
    if: >-
      ${{
        needs.verify.result == 'success' &&
        needs.mobile-assets.result == 'success' &&
        (needs.discover.outputs.has_apps != 'true' || needs.build-images.result == 'success')
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download mobile bundle
        uses: actions/download-artifact@v4
        with:
          name: mobile-web-bundle

      - name: Download Android debug APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk

      - name: Download Android release APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
        continue-on-error: true

      - name: Download Android release AAB
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab
        continue-on-error: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: HOBBIT ${{ inputs.version }}
          body: |
            Mobile assets were built with `PUBLIC_API_URL=${{ inputs.public_api_url }}`.
            Override the `public_api_url` workflow input when the default production API host is not correct.
          generate_release_notes: true
          files: |
            mobile-web-bundle.tar.gz
            app-debug.apk
            **/app-release.apk
            **/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy (optional)
    needs: [discover, build-images, release]
    if: ${{ inputs.deploy && needs.discover.outputs.has_apps == 'true' && needs.build-images.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Resolve deploy contract
        run: |
          registry="${{ vars.DEPLOY_REGISTRY }}"
          if [ -z "$registry" ]; then
            registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          version="${{ inputs.version }}"
          apps='${{ needs.discover.outputs.matrix }}'
          images=$(echo "$apps" | jq -c --arg reg "$registry" --arg ver "$version" \
            'map({ (.): ($reg + "/" + . + ":" + $ver) }) | add')
          {
            echo "DEPLOY_REGISTRY=${registry}"
            echo "DEPLOY_SHA=${version}"
            echo "DEPLOY_APPS=$(echo "$apps" | jq -r 'join(",")')"
            echo "DEPLOY_IMAGES=${images}"
          } >> "$GITHUB_ENV"

      - name: Run deploy dispatcher
        env:
          DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET }}
        run: node scripts/deploy/run.mjs
