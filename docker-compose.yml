services:
  web-host:
    build:
      context: .
      dockerfile: apps/web-host/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-https://hobbit-api.drcode.ai}
    environment:
      NODE_ENV: production
      PORT: 4321
      HOST: 0.0.0.0
      PRIMARY_FRONTEND: ${PRIMARY_FRONTEND:-web}
    expose:
      - '4321'
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-https://hobbit.drcode.ai}
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/prod.db}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      UPLOAD_DIR: /app/data/uploads
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o-mini}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-}
    expose:
      - '3001'
    volumes:
      - app-data:/app/data

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      web-host:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  app-data:
